<svg xmlns="http://www.w3.org/2000/svg" width="720" height="200" viewBox="0 0 720 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2F81F7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="quill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2F81F7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="720" height="200" fill="url(#bg)" rx="12"/>

  <!-- 装饰背景：网格点 -->
  <g opacity="0.08" fill="#2F81F7">
    <circle cx="40" cy="40" r="1.5"/><circle cx="80" cy="40" r="1.5"/><circle cx="120" cy="40" r="1.5"/>
    <circle cx="40" cy="80" r="1.5"/><circle cx="80" cy="80" r="1.5"/><circle cx="120" cy="80" r="1.5"/>
    <circle cx="600" cy="120" r="1.5"/><circle cx="640" cy="120" r="1.5"/><circle cx="680" cy="120" r="1.5"/>
    <circle cx="600" cy="160" r="1.5"/><circle cx="640" cy="160" r="1.5"/><circle cx="680" cy="160" r="1.5"/>
  </g>

  <!-- 鹅毛笔 Logo（简笔，渐变描边） -->
  <g transform="translate(50, 60)">
    <!-- 笔杆 -->
    <path d="M 0 70 L 50 20" stroke="url(#quill)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <!-- 笔尖 -->
    <path d="M 50 20 L 60 30 L 10 80 Z" fill="url(#quill)" opacity="0.85"/>
    <!-- 笔羽 -->
    <path d="M 5 65 Q -5 50 5 35 Q 25 25 50 20" stroke="url(#quill)" stroke-width="2" fill="none" opacity="0.6"/>
    <path d="M 15 60 Q 5 50 15 35 Q 30 28 50 22" stroke="url(#quill)" stroke-width="1.5" fill="none" opacity="0.4"/>
  </g>

  <!-- 标题 QuillRAG -->
  <text x="160" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="64" font-weight="700" fill="url(#text)" letter-spacing="-1">QuillRAG</text>

  <!-- 副标题 -->
  <text x="162" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" font-weight="400" fill="#8b949e">Independent RAG service · MinerU PDF parsing · Hybrid retrieval · Cross-Encoder rerank</text>

  <!-- 底部 tagline -->
  <text x="162" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="13" font-weight="400" fill="#6e7681">独立 RAG 服务 · PDF 复杂解析 · 混合检索 · 重排序</text>
</svg>
